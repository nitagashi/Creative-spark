name: "publish"

on:
  push:
    branches:
      - main
    tags:
      - "v*"
  pull_request:
    types: [closed]
    branches:
      - main
  workflow_dispatch:
    inputs:
      bump_type:
        description: "Version bump type"
        required: false
        default: ""
        type: choice
        options:
          - ""
          - patch
          - minor
          - major

jobs:
  # Auto-bump version in tauri.conf.json
  bump-version:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.bump.outputs.version }}
      tag: v${{ steps.bump.outputs.version }}
      bumped: ${{ steps.bump.outputs.bumped }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Get current version from tauri.conf.json
        id: current_version
        run: |
          CURRENT_VERSION=$(node -p "require('./src-tauri/tauri.conf.json').version")
          echo "current=$CURRENT_VERSION" >> $GITHUB_OUTPUT
          echo "Current version in config: $CURRENT_VERSION"

      - name: Check if tag already exists for current version
        id: check_tag
        run: |
          CURRENT_VERSION="${{ steps.current_version.outputs.current }}"
          TAG="v$CURRENT_VERSION"

          if git rev-parse "$TAG" >/dev/null 2>&1; then
            echo "exists=true" >> $GITHUB_OUTPUT
            echo "Tag $TAG already exists - this version has been released"
          else
            echo "exists=false" >> $GITHUB_OUTPUT
            echo "Tag $TAG does not exist - will create release"
          fi

      - name: Bump version (only if needed)
        id: bump
        run: |
          CURRENT="${{ steps.current_version.outputs.current }}"
          TAG_EXISTS="${{ steps.check_tag.outputs.exists }}"

          # If tag already exists for current version, bump to a new version
          if [[ "$TAG_EXISTS" == "true" ]]; then
            echo "Current version $CURRENT already has a release tag"
            
            # Split version into parts
            IFS='.' read -r MAJOR MINOR PATCH <<< "$CURRENT"
            
            # Determine bump type
            if [[ "${{ github.event.inputs.bump_type }}" != "" && "${{ github.event.inputs.bump_type }}" != "" ]]; then
              BUMP_TYPE="${{ github.event.inputs.bump_type }}"
            else
              # Auto-detect from commit messages
              COMMIT_MSG=$(git log -1 --pretty=%B)
              if [[ "$COMMIT_MSG" =~ ^feat\(?[a-z]*\)?!?: ]] || [[ "$COMMIT_MSG" =~ BREAKING\ CHANGE ]]; then
                BUMP_TYPE="major"
              elif [[ "$COMMIT_MSG" =~ ^feat ]]; then
                BUMP_TYPE="minor"
              else
                BUMP_TYPE="patch"
              fi
            fi
            
            echo "Bump type: $BUMP_TYPE"
            
            # Calculate new version
            case $BUMP_TYPE in
              major)
                NEW_VERSION="$((MAJOR + 1)).0.0"
                ;;
              minor)
                NEW_VERSION="$MAJOR.$((MINOR + 1)).0"
                ;;
              patch)
                NEW_VERSION="$MAJOR.$MINOR.$((PATCH + 1))"
                ;;
            esac
            
            echo "New version: $NEW_VERSION"
            echo "version=$NEW_VERSION" >> $GITHUB_OUTPUT
            echo "bumped=true" >> $GITHUB_OUTPUT
            
            # Update tauri.conf.json
            node -e "
              const fs = require('fs');
              const config = JSON.parse(fs.readFileSync('./src-tauri/tauri.conf.json', 'utf8'));
              config.version = '$NEW_VERSION';
              fs.writeFileSync('./src-tauri/tauri.conf.json', JSON.stringify(config, null, 2));
            "
            
            # Update package.json if it exists
            if [ -f "package.json" ]; then
              node -e "
                const fs = require('fs');
                const pkg = JSON.parse(fs.readFileSync('./package.json', 'utf8'));
                pkg.version = '$NEW_VERSION';
                fs.writeFileSync('./package.json', JSON.stringify(pkg, null, 2));
              "
            fi
            
            # Commit and push the version bump
            git config user.name "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            git add src-tauri/tauri.conf.json package.json 2>/dev/null || true
            git commit -m "chore: bump version to $NEW_VERSION [skip ci]"
            git push origin ${{ github.ref_name }}
            
            # Create and push tag for new version
            git tag "v$NEW_VERSION"
            git push origin "v$NEW_VERSION"
          else
            # First release - use current version from config
            echo "First release - using current version: $CURRENT"
            echo "version=$CURRENT" >> $GITHUB_OUTPUT
            echo "bumped=false" >> $GITHUB_OUTPUT
            
            # Create tag for current version
            git config user.name "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            git tag "v$CURRENT"
            git push origin "v$CURRENT"
          fi

  # Main build job
  publish-tauri:
    needs: bump-version
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: "windows-latest"
            args: ""

    runs-on: ${{ matrix.platform }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      # Setup Node.js
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: lts/*
          cache: "npm"

      # Setup Rust
      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          profile: minimal

      # Rust cache
      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: "./src-tauri -> target"

      # Install frontend dependencies
      - name: Install dependencies
        run: npm ci

      # Build the app with signing
      - uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_KEY_PASSWORD }}
        with:
          tagName: v${{ needs.bump-version.outputs.version }}
          releaseName: "v${{ needs.bump-version.outputs.version }}"
          releaseBody: "See the assets to download this version."
          releaseDraft: false
          prerelease: false
          args: ${{ matrix.args }}
