name: "cleanup-releases"

on:
  # Trigger this workflow after your publish workflow completes
  workflow_run:
    workflows: ["publish"] # Must match your publish workflow name
    types:
      - completed
    branches:
      - release_app # Only run when publish ran on release branch

  # Also allow manual trigger if needed
  workflow_dispatch:

jobs:
  cleanup:
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-latest
    permissions:
      contents: write # Needed to delete releases and tags

    steps:
      - name: Delete old releases
        uses: actions/github-script@v7
        with:
          script: |
            // Get all releases
            const releases = await github.rest.repos.listReleases({
              owner: context.repo.owner,
              repo: context.repo.repo,
            });

            // Filter out draft releases, keep only published ones
            const publishedReleases = releases.data.filter(r => !r.draft);

            console.log(`Total published releases: ${publishedReleases.length}`);

            // Keep latest 5, delete the rest
            const toDelete = publishedReleases.slice(5);

            if (toDelete.length === 0) {
              console.log("No releases to delete");
              return;
            }

            console.log(`Keeping ${publishedReleases.slice(0, 5).length} releases`);
            console.log(`Deleting ${toDelete.length} releases:`);

            for (const release of toDelete) {
              console.log(`  - Deleting: ${release.tag_name} (${release.name})`);
              
              // Delete the release
              await github.rest.repos.deleteRelease({
                owner: context.repo.owner,
                repo: context.repo.repo,
                release_id: release.id,
              });
              
              // Delete the associated tag
              try {
                await github.rest.git.deleteRef({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  ref: `tags/${release.tag_name}`,
                });
                console.log(`    ✓ Deleted tag: ${release.tag_name}`);
              } catch (error) {
                console.log(`    ⚠ Could not delete tag ${release.tag_name}: ${error.message}`);
              }
            }

            console.log("✅ Cleanup complete!");
